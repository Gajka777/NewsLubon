{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle display-4 text-primary"></i>
                    <h3 class="mt-3">Zaloguj się</h3>
                    <p class="text-muted">Wejdź do portalu</p>
                </div>
                
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Nazwa użytkownika lub email</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Zaloguj się</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">Nie masz konta? 
                        <a href="{{ url_for('register') }}">Zarejestruj się</a>
                    </p>
                </div>
                
                <div class="mt-4 p-3 bg-light rounded small text-muted">
                    <strong>Demo:</strong><br>
                    Admin: <code>admin</code> / <code>admin123</code><br>
                    Redaktor: <code>redaktor1</code> / <code>author123</code>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
