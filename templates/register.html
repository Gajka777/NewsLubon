{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-4 text-primary"></i>
                    <h3 class="mt-3">Zarejestruj się</h3>
                    <p class="text-muted">Dołącz do społeczności</p>
                </div>
                
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Nazwa użytkownika</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Adres email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <input type="password" name="password" class="form-control" required minlength="6">
                        <div class="form-text">Minimum 6 znaków</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Powtórz hasło</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Zarejestruj się</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">Masz już konto? 
                        <a href="{{ url_for('login') }}">Zaloguj się</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
